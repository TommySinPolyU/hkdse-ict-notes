function HighlightMark({ star, children }) {
  const [show, setShow] = useState(false);
  const ref = useRef(null);
  
  useEffect(() => {
    if (!show) return;
    const close = (e) => { if (ref.current && !ref.current.contains(e.target)) setShow(false); };
    const t = setTimeout(() => document.addEventListener('click', close), 50);
    return () => { clearTimeout(t); document.removeEventListener('click', close); };
  }, [show]);
  
  const hasNote = star.note && star.note.trim().length > 0;
  return (
    <span ref={ref} className="relative inline"
      onMouseEnter={() => hasNote && setShow(true)}
      onMouseLeave={() => setShow(false)}>
      <mark
        className={`hl-mark ${hasNote ? 'has-note' : ''}`}
        onClick={(e) => { if (hasNote) { e.stopPropagation(); setShow(!show); } }}
        title={hasNote ? '點擊查看筆記' : '已標記'}
      >{children}{hasNote && <span className="text-xs ml-0.5">📝</span>}</mark>
      {show && hasNote && (
        <span className="absolute bottom-full left-0 mb-2 z-50 bg-slate-900 text-yellow-50 text-xs rounded-lg p-3 shadow-2xl block fade-in" style={{width: '260px', maxWidth: '90vw'}}>
          <span className="block font-bold text-yellow-300 mb-1">📝 我的筆記</span>
          <span className="block whitespace-pre-wrap break-words">{star.note}</span>
        </span>
      )}
    </span>
  );
}

function HighlightedText({ text, sectionId, starred }) {
  if (typeof text !== 'string' || !text) return text;
  const relevant = (starred || []).filter(s => s.section === sectionId && s.text && text.includes(s.text));
  if (relevant.length === 0) return text;
  const sorted = [...relevant].sort((a, b) => b.text.length - a.text.length);
  let segments = [{ text, star: null }];
  sorted.forEach(star => {
    const next = [];
    segments.forEach(seg => {
      if (seg.star || !seg.text.includes(star.text)) { next.push(seg); return; }
      const parts = seg.text.split(star.text);
      parts.forEach((part, i) => {
        if (part) next.push({ text: part, star: null });
        if (i < parts.length - 1) next.push({ text: star.text, star });
      });
    });
    segments = next;
  });
  return segments.map((seg, i) =>
    seg.star
      ? <HighlightMark key={i} star={seg.star}>{seg.text}</HighlightMark>
      : <React.Fragment key={i}>{seg.text}</React.Fragment>
  );
}

          onFocus={() => setFocused(true)} onBlur={() => setTimeout(() => setFocused(false), 200)}
          placeholder="🔍 搜尋關鍵字..."
          className="w-full px-4 py-2 pr-10 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400"/>
        {value && <button onClick={() => onChange('')} className="absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700 text-xl">×</button>}
      </div>
      {showDropdown && (
        <div className="absolute left-4 right-4 mt-1 bg-white border rounded-lg shadow-xl max-h-96 overflow-y-auto fade-in">
          {results.length === 0 ? <div className="p-4 text-slate-500 text-sm">沒有結果</div> : (
            <div>
              <div className="px-3 py-2 bg-slate-50 text-xs text-slate-600 border-b">找到 {results.length} 個結果</div>
              {results.map((r, i) => (
                <button key={i} onClick={() => onNavigate(r.sectionId)} className="block w-full text-left px-3 py-2 hover:bg-indigo-50 border-b border-slate-100 last:border-0">
                  <div className="text-xs text-indigo-600 font-medium">{r.unitTitle} › {r.sectionTitle}</div>
                  <div className="text-sm text-slate-700 mt-1">{r.match}</div>
                </button>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function Sidebar({ visible, data, activeSection, onSelect, onClose, questionBank }) {
  const [expanded, setExpanded] = useState(() => { const i = {}; data.forEach(u => i[u.id] = true); return i; });
  const toggle = (id) => setExpanded({ ...expanded, [id]: !expanded[id] });
  const colors = { blue:"border-blue-400 bg-blue-50 text-blue-900", green:"border-green-400 bg-green-50 text-green-900", purple:"border-purple-400 bg-purple-50 text-purple-900", orange:"border-orange-400 bg-orange-50 text-orange-900", pink:"border-pink-400 bg-pink-50 text-pink-900", cyan:"border-cyan-400 bg-cyan-50 text-cyan-900", teal:"border-teal-400 bg-teal-50 text-teal-900", red:"border-red-400 bg-red-50 text-red-900" };
  return (
    <>
      {visible && <div className="fixed inset-0 bg-black/30 z-30 md:hidden" onClick={onClose}></div>}
      <aside className={`${visible ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0 fixed md:relative z-40 md:z-auto top-0 md:top-auto bottom-0 md:bottom-auto h-full md:h-auto w-72 bg-white border-r overflow-y-auto transition-transform duration-300`}>
        <div className="p-3 md:p-4">
          <button onClick={() => onSelect('home')} className={`w-full text-left p-2 rounded-lg border mb-3 ${activeSection === 'home' ? 'bg-indigo-50 border-indigo-300 text-indigo-700' : 'bg-slate-50 border-slate-200 text-slate-700 hover:bg-slate-100'}`}>🏠 首頁及操作說明</button>
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-bold text-slate-700">📖 課程單元</h2>
            <button onClick={onClose} className="md:hidden text-slate-500 text-xl">×</button>
          </div>
          {data.map(unit => (
            <div key={unit.id} className="mb-2">
              <button onClick={() => toggle(unit.id)} className={`w-full text-left p-2 rounded-lg border-l-4 ${colors[unit.color]} hover:brightness-95`}>
                <div className="flex items-center justify-between">
                  <div>
                    <div className="font-bold text-sm">{unit.title}</div>
                    <div className="text-xs opacity-70">{unit.subtitle} · {unit.duration}</div>
                  </div>
                  <span className="text-xs">{expanded[unit.id] ? '▼' : '▶'}</span>
                </div>
              </button>
              {expanded[unit.id] && (
                <div className="ml-4 mt-1 space-y-0.5">
                  {unit.sections.map(s => {
                    const qCount = (questionBank[s.id] || []).length;
                    return (
                      <button key={s.id} onClick={() => onSelect(s.id)}
                        className={`w-full text-left px-3 py-1.5 text-sm rounded transition flex items-center justify-between ${activeSection === s.id ? 'bg-indigo-100 text-indigo-800 font-semibold border-l-4 border-indigo-500' : 'text-slate-600 hover:bg-slate-50'}`}>
                        <span>{s.title}</span>
                        {qCount > 0 && <span className="text-xs bg-indigo-100 text-indigo-700 px-1.5 rounded-full ml-2">{qCount}</span>}
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
          ))}
        </div>
      </aside>
    </>
  );
}

function ContentBlock({ block, sectionId, starred }) {
  const ht = (txt) => <HighlightedText text={txt} sectionId={sectionId} starred={starred} />;
  switch (block.type) {
    case "heading": return <h3 className="text-lg font-bold text-indigo-700 mt-6 mb-2 border-b-2 border-indigo-200 pb-1">{block.text}</h3>;
    case "para": return <p className="mb-3 text-slate-800 content-text">{ht(block.text)}</p>;
    case "list": return (
      <div className="mb-3">
        {block.title && <p className="font-semibold text-slate-700 mb-1">{ht(block.title)}</p>}
        <ul className="list-disc list-inside space-y-1 text-slate-800 content-text">{block.items.map((it, i) => <li key={i}>{ht(it)}</li>)}</ul>
      </div>
    );
    case "keypoint": return (
      <div className="my-4 p-3 bg-gradient-to-r from-yellow-50 to-amber-50 border-l-4 border-amber-400 rounded-r">
        {block.title && <div className="font-bold text-amber-800 mb-1">{ht(block.title)}</div>}
        <div className="text-slate-800 content-text">{ht(block.text)}</div>
      </div>
    );
    case "warning": return <div className="my-3 p-3 bg-red-50 border-l-4 border-red-400 rounded-r text-red-800 content-text">{ht(block.text)}</div>;
    case "example": return (
      <div className="my-3 p-3 bg-slate-800 text-green-300 font-mono text-sm rounded whitespace-pre-wrap">
        {block.title && <div className="text-yellow-300 font-bold mb-1">{block.title}</div>}{block.text}
      </div>
    );
    case "table": return (
      <div className="overflow-x-auto my-3">
        <table className="min-w-full border-collapse border border-slate-300 text-sm">
          <thead><tr className="bg-indigo-100">{block.headers.map((h, i) => <th key={i} className="border border-slate-300 px-3 py-2 text-left font-bold text-indigo-900">{h}</th>)}</tr></thead>
          <tbody>{block.rows.map((row, i) => <tr key={i} className={i % 2 === 0 ? 'bg-white' : 'bg-slate-50'}>{row.map((cell, j) => <td key={j} className="border border-slate-300 px-3 py-2 text-slate-800">{ht(cell)}</td>)}</tr>)}</tbody>
        </table>
      </div>
    );
    default: return null;
  }
}

function QuizQuestion({ question, sectionId, onAnswer }) {
  const [selected, setSelected] = useState(null);
  const [submitted, setSubmitted] = useState(false);
  const submit = () => { if (selected && !submitted) { setSubmitted(true); onAnswer(sectionId, question, selected, selected === question.answer); } };
  const reset = () => { setSelected(null); setSubmitted(false); };
  return (
    <div className="p-4 border border-slate-200 rounded-lg bg-white shadow-sm mb-4">
      <div className="flex justify-between items-start mb-3">
        <div className="text-sm text-indigo-600 font-semibold">📝 {question.id}</div>
        {question.source && <div className="text-xs text-slate-400">{question.source}</div>}
      </div>
      <p className="mb-3 font-medium text-slate-800 whitespace-pre-wrap">{question.question}</p>
      <div className="space-y-2 mb-3">
        {Object.entries(question.options).map(([k, v]) => {
          let cn = "w-full text-left p-3 rounded border cursor-pointer transition ";
          if (!submitted) cn += selected === k ? "bg-indigo-100 border-indigo-400" : "bg-white border-slate-200 hover:bg-slate-50";
          else { if (k === question.answer) cn += "bg-green-100 border-green-500 font-semibold"; else if (k === selected) cn += "bg-red-100 border-red-500"; else cn += "bg-white border-slate-200 opacity-60"; }
          return <button key={k} onClick={() => !submitted && setSelected(k)} disabled={submitted} className={cn}><span className="font-bold mr-2">{k}.</span>{v}{submitted && k === question.answer && <span className="ml-2 text-green-600">✓ 正確</span>}{submitted && k === selected && k !== question.answer && <span className="ml-2 text-red-600">✗ 你的選擇</span>}</button>;
        })}
      </div>
      {!submitted ? (
        <button onClick={submit} disabled={!selected} className="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 disabled:bg-slate-300">提交答案</button>
      ) : (
        <div>
          <div className={`p-3 rounded mb-2 ${selected === question.answer ? 'bg-green-50 border-l-4 border-green-400' : 'bg-red-50 border-l-4 border-red-400'}`}>
            <div className="font-bold mb-1">{selected === question.answer ? '🎉 答對了！' : '❌ 答錯了，再接再厲！'}</div>
            <div className="text-sm text-slate-700"><span className="font-semibold">解釋：</span>{question.explanation}</div>
          </div>
          <button onClick={reset} className="px-4 py-2 bg-slate-500 text-white rounded hover:bg-slate-600 text-sm">重新作答</button>
        </div>
      )}
    </div>
  );
}

function SectionContent({ unit, section, onRecordAnswer, questionBank, starred }) {
  const sq = questionBank[section.id] || [];
  const [current, setCurrent] = useState([]);
  const [quizCount, setQuizCount] = useState(3);
  useEffect(() => { const s = [...sq].sort(() => Math.random() - 0.5); setCurrent(s.slice(0, Math.min(quizCount, s.length))); }, [section.id, quizCount, sq.length]);
  const refresh = () => { const s = [...sq].sort(() => Math.random() - 0.5); setCurrent(s.slice(0, Math.min(quizCount, s.length))); };
  return (
    <article className="max-w-4xl mx-auto">
      <div className="mb-6 pb-3 border-b-2 border-indigo-300">
        <div className="text-sm text-slate-500">{unit.title} · {unit.duration}</div>
        <h1 className="text-2xl md:text-3xl font-bold text-slate-800 mt-1">{section.title}</h1>
      </div>
      <div className="bg-white rounded-lg p-4 md:p-6 shadow-sm mb-6">
        {section.content.map((b, i) => <ContentBlock key={i} block={b} sectionId={section.id} starred={starred} />)}
      </div>
      {sq.length > 0 && (
        <div className="bg-gradient-to-br from-indigo-50 to-purple-50 rounded-lg p-4 md:p-6 shadow-sm">
          <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
            <h2 className="text-xl font-bold text-indigo-800">🎯 答題練習 ({sq.length} 題題庫)</h2>
            <div className="flex items-center gap-2">
              <select value={quizCount} onChange={e => setQuizCount(Number(e.target.value))} className="px-2 py-1 border rounded text-sm">
                <option value={3}>3 題</option>
                <option value={5}>5 題</option>
                <option value={10}>10 題</option>
                <option value={999}>全部</option>
              </select>
              <button onClick={refresh} className="px-3 py-1.5 bg-white text-indigo-700 border border-indigo-300 rounded text-sm hover:bg-indigo-50">🔄 換一批</button>
            </div>
          </div>
          <div className="text-sm text-slate-600 mb-4">💡 選取筆記文字後會出現「標記」按鈕，可同時加入筆記</div>
          {current.map(q => <QuizQuestion key={q.id} question={q} sectionId={section.id} onAnswer={onRecordAnswer} />)}
        </div>
      )}
      {sq.length === 0 && (
        <div className="bg-yellow-50 border border-yellow-200 rounded p-4 text-sm text-yellow-800">
          ℹ️ 本章節目前尚未有題目。你可以編輯對應的 JSON 檔案加入題目。
        </div>
      )}
    </article>
  );
}

// ============================================================
// 快速標記輸入 Modal
// ============================================================
function QuickNoteModal({ text, onSave, onCancel }) {
  const [note, setNote] = useState('');
  return (
    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onClick={onCancel}>
      <div className="bg-white rounded-lg max-w-md w-full p-5" onClick={e => e.stopPropagation()}>
        <div className="text-lg font-bold mb-2 text-slate-800">⭐ 標記重點</div>
        <div className="bg-yellow-100 p-2 rounded text-sm mb-3 text-slate-900 max-h-32 overflow-y-auto">"{text}"</div>
        <label className="block text-sm text-slate-600 mb-1">添加筆記（可選）：</label>
        <textarea
          value={note}
          onChange={e => setNote(e.target.value)}
          placeholder="例如：這是重點定義，2025 年常考..."
          className="w-full p-2 border rounded text-sm resize-none focus:outline-none focus:ring-2 focus:ring-indigo-400"
          rows={3}
          autoFocus
        />
        <div className="flex gap-2 mt-3 justify-end">
          <button onClick={onCancel} className="px-4 py-2 bg-slate-200 text-slate-700 rounded hover:bg-slate-300 text-sm">取消</button>
          <button onClick={() => onSave('')} className="px-4 py-2 bg-yellow-500 text-white rounded hover:bg-yellow-600 text-sm">不加筆記</button>
          <button onClick={() => onSave(note)} className="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 text-sm">儲存</button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// StarredItem + StarredModal（已標記，含筆記編輯）
// ============================================================
function StarredItem({ star, onRemove, onUpdateNote, onNavigate }) {
  const [editing, setEditing] = useState(false);
  const [text, setText] = useState(star.note || '');
  const info = findSection(star.section);
  const label = info ? `${info.unit.title} · ${info.section.title}` : star.section;
  const save = () => { onUpdateNote(star.id, text); setEditing(false); };
  return (
    <div className="border border-slate-200 rounded p-3 hover:bg-yellow-50/30">
      <div className="text-xs text-indigo-600 mb-1 font-semibold">{label}</div>
      <div className="bg-yellow-100 border-l-4 border-yellow-400 p-2 rounded mb-2 text-slate-900 text-sm">
        "{star.text}"
      </div>
      {editing ? (
        <div className="mb-2">
          <textarea value={text} onChange={e => setText(e.target.value)}
            placeholder="輸入筆記..."
            className="w-full p-2 border rounded text-sm resize-none focus:outline-none focus:ring-2 focus:ring-indigo-400"
            rows={3} autoFocus />
          <div className="flex gap-2 mt-2">
            <button onClick={save} className="px-3 py-1 bg-green-500 text-white text-xs rounded hover:bg-green-600">✓ 儲存</button>
            <button onClick={() => { setEditing(false); setText(star.note || ''); }} className="px-3 py-1 bg-slate-300 text-slate-700 text-xs rounded hover:bg-slate-400">取消</button>
          </div>
        </div>
      ) : (
        <div className="mb-2">
          {star.note ? (
            <div className="bg-blue-50 border-l-4 border-blue-400 p-2 rounded text-sm text-slate-800 whitespace-pre-wrap">
              📝 {star.note}
            </div>
          ) : (
            <div className="text-xs text-slate-400 italic py-1">尚未添加筆記</div>
          )}
        </div>
      )}
      <div className="flex gap-2 justify-between items-center flex-wrap">
        <div className="text-xs text-slate-400">{star.timestamp}</div>
        <div className="flex gap-1 flex-wrap">
          {!editing && (
            <button onClick={() => setEditing(true)} className="px-2 py-1 bg-blue-500 text-white text-xs rounded hover:bg-blue-600">
              {star.note ? '✏️ 編輯筆記' : '➕ 新增筆記'}
            </button>
          )}
          <button onClick={() => onNavigate(star.section)} className="px-2 py-1 bg-indigo-500 text-white text-xs rounded hover:bg-indigo-600">前往</button>
          <button onClick={() => onRemove(star.id)} className="px-2 py-1 bg-red-500 text-white text-xs rounded hover:bg-red-600">刪除</button>
        </div>
      </div>
    </div>
  );
}

function StarredModal({ starred, onClose, onRemove, onUpdateNote, onNavigate }) {
  const [filter, setFilter] = useState('all'); // all / withNote / noNote
  const filtered = starred.filter(s => filter === 'all' ? true : filter === 'withNote' ? s.note : !s.note);
  const withNoteCount = starred.filter(s => s.note).length;
  return (
    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onClick={onClose}>
      <div className="bg-white rounded-lg w-full max-w-3xl max-h-[90vh] flex flex-col" onClick={e => e.stopPropagation()}>
        <div className="p-4 border-b flex items-center justify-between bg-gradient-to-r from-yellow-400 to-amber-500 text-white rounded-t-lg">
          <div>
            <h2 className="text-xl font-bold">⭐ 已標記內容 ({starred.length})</h2>
            <div className="text-xs opacity-90">含筆記：{withNoteCount} · 未加筆記：{starred.length - withNoteCount}</div>
          </div>
          <button onClick={onClose} className="text-2xl hover:bg-white/10 w-8 h-8 rounded">×</button>
        </div>
        {starred.length > 0 && (
          <div className="p-3 border-b bg-slate-50 flex gap-2 flex-wrap text-sm">
            <button onClick={() => setFilter('all')} className={`px-3 py-1 rounded ${filter==='all'?'bg-indigo-600 text-white':'bg-white border'}`}>全部</button>
            <button onClick={() => setFilter('withNote')} className={`px-3 py-1 rounded ${filter==='withNote'?'bg-indigo-600 text-white':'bg-white border'}`}>有筆記</button>
            <button onClick={() => setFilter('noNote')} className={`px-3 py-1 rounded ${filter==='noNote'?'bg-indigo-600 text-white':'bg-white border'}`}>未加筆記</button>
          </div>
        )}
        <div className="p-4 overflow-y-auto flex-1">
          {starred.length === 0 ? (
            <div className="text-center text-slate-500 py-12">
              <div className="text-4xl mb-3">📌</div>
              <div>尚未標記任何內容</div>
              <div className="text-xs mt-2">選取筆記中的文字即可標記</div>
            </div>
          ) : filtered.length === 0 ? (
            <div className="text-center text-slate-500 py-8">此條件下沒有標記</div>
          ) : (
            <div className="space-y-3">
              {filtered.slice().reverse().map(s => (
                <StarredItem key={s.id} star={s} onRemove={onRemove} onUpdateNote={onUpdateNote} onNavigate={onNavigate} />
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// 答題練習歷史
// ============================================================
function PracticeHistoryModal({ history, onClose, onClear }) {
  const [filter, setFilter] = useState('all');
  const [keyword, setKeyword] = useState('');
  const grouped = useMemo(() => { const g = {}; history.forEach(h => { if (!g[h.sectionId]) g[h.sectionId] = []; g[h.sectionId].push(h); }); return g; }, [history]);
  const sids = Object.keys(grouped);
  const filtered = sids.filter(sid => {
    const info = findSection(sid);
    const passUnit = filter === 'all' ? true : (info && info.unit.id === filter);
    const passKeyword = !keyword.trim() ? true : grouped[sid].some(h => (`${h.question} ${h.userAnswer || ''} ${h.correctAnswer || ''}`).toLowerCase().includes(keyword.toLowerCase()));
    return passUnit && passKeyword;
  });
  const correct = history.filter(h => h.isCorrect).length;
  const acc = history.length > 0 ? ((correct / history.length) * 100).toFixed(1) : 0;
  return (
    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onClick={onClose}>
      <div className="bg-white rounded-lg max-w-4xl w-full max-h-[90vh] flex flex-col" onClick={e => e.stopPropagation()}>
        <div className="p-4 border-b bg-gradient-to-r from-green-500 to-emerald-600 text-white rounded-t-lg">
          <div className="flex items-center justify-between">
            <h2 className="text-xl font-bold">📝 答題練習記錄</h2>
            <button onClick={onClose} className="text-2xl hover:bg-white/10 w-8 h-8 rounded">×</button>
          </div>
          <div className="mt-2 flex gap-4 text-sm flex-wrap">
            <div>總題數：{history.length}</div><div>答對：{correct}</div><div>準確率：{acc}%</div>
            {history.length > 0 && <button onClick={() => { if (confirm('確認清除所有練習記錄？')) onClear(); }} className="ml-auto px-2 py-0.5 bg-red-600 hover:bg-red-700 text-white text-xs rounded">清除全部</button>}
          </div>
        </div>
        {history.length > 0 && (
          <div className="p-3 border-b bg-slate-50 flex flex-col md:flex-row gap-2 md:items-center">
            <select value={filter} onChange={e => setFilter(e.target.value)} className="px-3 py-2 border rounded text-sm md:w-56">
              <option value="all">所有單元</option>
              {curriculumData.map(u => <option key={u.id} value={u.id}>{u.title}</option>)}
            </select>
            <input value={keyword} onChange={e => setKeyword(e.target.value)} placeholder="搜尋題目、你的答案或正確答案" className="px-3 py-2 border rounded text-sm flex-1 md:max-w-md" />
          </div>
        )}
        <div className="p-4 overflow-y-auto flex-1">
          {history.length === 0 ? <div className="text-center text-slate-500 py-12">尚未作答任何題目</div> : filtered.length === 0 ? <div className="text-center text-slate-500 py-12">沒有符合搜尋或篩選條件的單獨練習記錄</div> : (
            filtered.map(sid => {
              const info = findSection(sid);
              return (
                <div key={sid} className="mb-6">
                  <h3 className="font-bold text-indigo-700 mb-2 pb-1 border-b border-indigo-200">{info ? `${info.unit.title} · ${info.section.title}` : sid}</h3>
                  {grouped[sid].slice().reverse().filter(h => !keyword.trim() || (`${h.question} ${h.userAnswer || ''} ${h.correctAnswer || ''}`).toLowerCase().includes(keyword.toLowerCase())).map(h => (
                    <div key={h.id} className={`mb-3 p-3 rounded border-l-4 ${h.isCorrect ? 'border-green-400 bg-green-50' : 'border-red-400 bg-red-50'}`}>
                      <div className="flex justify-between items-start mb-2 gap-2">
                        <div className="text-xs text-slate-500">{h.questionId} · {h.timestamp}</div>
                        <div className={`text-sm font-bold shrink-0 ${h.isCorrect ? 'text-green-600' : 'text-red-600'}`}>{h.isCorrect ? '✓ 答對' : '✗ 答錯'}</div>
                      </div>
                      <div className="font-medium mb-2 text-slate-800">{h.question}</div>
                      <div className="text-sm space-y-1 mb-2">
                        {Object.entries(h.options).map(([k, v]) => <div key={k} className={`${k === h.correctAnswer ? 'text-green-700 font-bold' : k === h.userAnswer && k !== h.correctAnswer ? 'text-red-600 line-through' : 'text-slate-600'}`}>{k}. {v}{k === h.correctAnswer && ' ✓'}{k === h.userAnswer && k !== h.correctAnswer && ' (你的選擇)'}</div>)}
                      </div>
                      <div className="text-xs bg-white p-2 rounded border"><span className="font-semibold">解釋：</span>{h.explanation}</div>
                    </div>
                  ))}
                </div>
              );
            })
          )}
        </div>
      </div>
    </div>
  );
}

// 📋 模擬測驗：設定
// ============================================================
function TestSetupModal({ questionBank, onStart, onClose }) {
  const [selected, setSelected] = useState(() => new Set(curriculumData.map(u => u.id)));
  const [count, setCount] = useState(10);

  const perUnit = useMemo(() => {
    const m = {};
    curriculumData.forEach(u => {
      let total = 0;
      u.sections.forEach(s => {
        total += (questionBank[s.id] || []).filter(q => {
          const src = String(q.source || '').trim().toLowerCase();
          return src !== 'ai生成' && src !== 'ai 生成' && src !== 'ai-generated' && src !== 'ai generated';
        }).length;
      });
      m[u.id] = total;
    });
    return m;
  }, [questionBank]);

  const available = useMemo(() => {
    const qs = [];
    curriculumData.forEach(u => {
      if (!selected.has(u.id)) return;
      u.sections.forEach(s => {
        (questionBank[s.id] || [])
          .filter(q => {
            const src = String(q.source || '').trim().toLowerCase();
            return src !== 'ai生成' && src !== 'ai 生成' && src !== 'ai-generated' && src !== 'ai generated';
          })
          .forEach(q => qs.push({ ...q, sectionId: s.id, unitId: u.id }));
      });
    });
    return qs;
  }, [selected, questionBank]);

  const maxQ = available.length;
  const actualCount = Math.min(Math.max(1, count), maxQ);
  const timeLimit = actualCount * 60;

  const toggleUnit = (uid) => {
    const n = new Set(selected);
    if (n.has(uid)) n.delete(uid); else n.add(uid);
    setSelected(n);
  };

  const start = () => {
    if (maxQ === 0) { alert('請至少選擇一個有題目的單元'); return; }
    const shuffled = [...available].sort(() => Math.random() - 0.5);
    const picked = shuffled.slice(0, actualCount);
    onStart({ questions: picked, timeLimit, units: Array.from(selected), startTime: Date.now() });
  };

  return (
    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onClick={onClose}>
      <div className="bg-white rounded-lg w-full max-w-2xl max-h-[90vh] flex flex-col" onClick={e => e.stopPropagation()}>
        <div className="p-4 border-b bg-gradient-to-r from-purple-600 to-pink-600 text-white rounded-t-lg flex justify-between items-center">
          <h2 className="text-xl font-bold">📋 開始新測驗</h2>
          <button onClick={onClose} className="text-2xl w-8 h-8 rounded hover:bg-white/10">×</button>
        </div>
        <div className="p-5 overflow-y-auto flex-1">
          <div className="mb-4">
            <div className="mb-2 text-xs text-amber-700 bg-amber-50 border border-amber-200 rounded p-2">⚠️ 測驗模式會自動排除 source 為「AI生成」的題目；答題練習則不受影響。</div>
            <h3 className="font-bold text-slate-700 mb-2">1️⃣ 選擇單元範圍</h3>
            <div className="space-y-1">
              {curriculumData.map(u => (
                <label key={u.id} className={`flex items-center gap-2 p-2 rounded cursor-pointer border ${selected.has(u.id) ? 'bg-indigo-50 border-indigo-300' : 'bg-white border-slate-200'} ${perUnit[u.id] === 0 ? 'opacity-50' : ''}`}>
                  <input type="checkbox" checked={selected.has(u.id)} onChange={() => toggleUnit(u.id)} disabled={perUnit[u.id] === 0} className="w-4 h-4"/>
                  <div className="flex-1">
                    <div className="font-semibold text-sm text-slate-800">{u.title}</div>
                    <div className="text-xs text-slate-500">{u.subtitle} · 可用題目：{perUnit[u.id]}</div>
                  </div>
                </label>
              ))}
            </div>
          </div>
          <div className="mb-4">
            <h3 className="font-bold text-slate-700 mb-2">2️⃣ 題目數量</h3>
            <div className="flex items-center gap-3 flex-wrap">
              <input type="number" min="1" max={maxQ || 1} value={count}
                onChange={e => setCount(Number(e.target.value) || 1)}
                className="w-24 px-2 py-1 border rounded"/>
              <span className="text-sm text-slate-500">最多 {maxQ} 題可選</span>
              <div className="flex gap-1">
                {[5, 10, 20, 30].filter(n => n <= maxQ).map(n => (
                  <button key={n} onClick={() => setCount(n)} className="px-2 py-1 bg-slate-100 hover:bg-slate-200 rounded text-xs">{n}</button>
                ))}
                {maxQ > 0 && <button onClick={() => setCount(maxQ)} className="px-2 py-1 bg-slate-100 hover:bg-slate-200 rounded text-xs">全部</button>}
              </div>
            </div>
          </div>
          <div className="p-3 bg-gradient-to-r from-yellow-50 to-amber-50 border-l-4 border-amber-400 rounded mb-4">
            <div className="text-sm space-y-1">
              <div>📝 實際題目數：<strong>{actualCount}</strong> 題</div>
              <div>⏱️ 限時：<strong>{Math.floor(timeLimit/60)} 分鐘</strong>（每題 1 分鐘）</div>
              <div>📚 範圍：<strong>{selected.size}</strong> 個單元</div>
            </div>
          </div>
          <div className="text-xs text-slate-500 p-2 bg-slate-50 rounded">
            ⚠️ 提示：測驗開始後會進入計時狀態，時間用盡將自動提交。你可以在測驗中切換題目並修改答案。
          </div>
        </div>
        <div className="p-4 border-t flex gap-2 justify-end">
          <button onClick={onClose} className="px-4 py-2 bg-slate-200 text-slate-700 rounded hover:bg-slate-300">取消</button>
          <button onClick={start} disabled={maxQ === 0} className="px-6 py-2 bg-gradient-to-r from-purple-600 to-pink-600 text-white rounded hover:brightness-110 disabled:opacity-50 font-bold">🚀 開始測驗</button>
        </div>
      </div>
    </div>
  );
}

function TestRunner({ test, onSubmit, onCancel }) {
  const [curr, setCurr] = useState(0);
  const [answers, setAnswers] = useState({});
  const [timeLeft, setTimeLeft] = useState(test.timeLimit);
  const [qTimes, setQTimes] = useState({});
  const qStartRef = useRef(Date.now());
  const submittedRef = useRef(false);

  const finalize = () => {
    if (submittedRef.current) return;
    submittedRef.current = true;
    const elapsed = (Date.now() - qStartRef.current) / 1000;
    const finalTimes = { ...qTimes, [curr]: (qTimes[curr] || 0) + elapsed };
    const totalTimeUsed = test.timeLimit - timeLeft;
    const results = test.questions.map((q, idx) => ({
      questionId: q.id, sectionId: q.sectionId, unitId: q.unitId,
      question: q.question, options: q.options,
      correctAnswer: q.answer, userAnswer: answers[q.id] || null,
      isCorrect: answers[q.id] === q.answer,
      timeSpent: Math.round(finalTimes[idx] || 0),
      explanation: q.explanation, source: q.source || ''
    }));
    const score = results.filter(r => r.isCorrect).length;
    const unitStats = {};
    results.forEach(r => {
      if (!unitStats[r.unitId]) unitStats[r.unitId] = { total: 0, correct: 0, timeSpent: 0 };
      unitStats[r.unitId].total++;
      if (r.isCorrect) unitStats[r.unitId].correct++;
      unitStats[r.unitId].timeSpent += r.timeSpent;
    });
    onSubmit({
      id: Date.now(),
      timestamp: new Date().toLocaleString('zh-HK', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }),
      timeLimit: test.timeLimit, timeUsed: Math.max(0, totalTimeUsed),
      units: test.units, questions: results,
      score, total: results.length, unitStats
    });
  };

  useEffect(() => {
    if (timeLeft <= 0) { finalize(); return; }
    const t = setInterval(() => setTimeLeft(l => l - 1), 1000);
    return () => clearInterval(t);
  }, [timeLeft]);

  const goto = (idx) => {
    if (idx < 0 || idx >= test.questions.length || idx === curr) return;
    const elapsed = (Date.now() - qStartRef.current) / 1000;
    setQTimes(prev => ({ ...prev, [curr]: (prev[curr] || 0) + elapsed }));
    qStartRef.current = Date.now();
    setCurr(idx);
  };

  const pick = (letter) => {
    setAnswers(prev => ({ ...prev, [test.questions[curr].id]: letter }));
  };

  const cancel = () => {
    if (confirm('確認結束測驗？未提交的進度會完全遺失且不會儲存。')) onCancel();
  };

  const q = test.questions[curr];
  const answered = Object.keys(answers).length;
  const timeDanger = timeLeft < 60;

  return (
    <div className="fixed inset-0 bg-slate-900 z-50 flex flex-col">
      {/* Header with timer */}
      <div className="bg-gradient-to-r from-purple-700 to-pink-700 text-white p-3 shadow-lg flex items-center justify-between flex-wrap gap-2">
        <div className="font-bold">📋 測驗進行中</div>
        <div className={`flex items-center gap-3 font-mono text-lg font-bold ${timeDanger ? 'text-yellow-300 timer-pulse' : ''}`}>
          <span>⏱️ {fmtTime(timeLeft)}</span>
          <span className="text-sm font-normal">/ {fmtTime(test.timeLimit)}</span>
        </div>
        <button onClick={cancel} className="px-3 py-1 bg-red-600 hover:bg-red-700 text-white text-sm rounded">放棄測驗</button>
      </div>
      {/* Progress */}
      <div className="bg-white border-b p-2 flex items-center gap-2 flex-wrap">
        <div className="text-sm text-slate-600">已答：{answered}/{test.questions.length}</div>
        <div className="flex-1 bg-slate-200 h-2 rounded overflow-hidden min-w-[120px]">
          <div className="h-full bg-green-500 transition-all" style={{width: `${(answered/test.questions.length)*100}%`}}></div>
        </div>
      </div>
      <div className="flex-1 flex flex-col md:flex-row overflow-hidden">
        {/* Question grid sidebar */}
        <div className="md:w-48 bg-slate-50 border-b md:border-b-0 md:border-r p-2 overflow-y-auto">
          <div className="text-xs text-slate-600 mb-2 font-semibold">題目導覽</div>
          <div className="grid grid-cols-10 md:grid-cols-5 gap-1">
            {test.questions.map((tq, idx) => (
              <button key={idx} onClick={() => goto(idx)}
                className={`aspect-square text-xs font-bold rounded border transition
                  ${idx === curr ? 'bg-indigo-600 text-white border-indigo-700' :
                    answers[tq.id] ? 'bg-green-100 text-green-700 border-green-300' :
                    'bg-white text-slate-500 border-slate-300 hover:bg-slate-100'}`}>
                {idx + 1}
              </button>
            ))}
          </div>
        </div>
        {/* Current question */}
        <div className="flex-1 overflow-y-auto p-4 md:p-6 bg-white">
          <div className="max-w-3xl mx-auto">
            <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
              <div className="text-sm text-indigo-600 font-bold">
                第 {curr + 1} / {test.questions.length} 題
              </div>
              <div className="text-xs text-slate-500">
                來源：{findUnit(q.unitId)?.title} · {q.id}
              </div>
            </div>
            <div className="bg-slate-50 rounded-lg p-4 mb-4">
              <p className="font-medium text-slate-800 whitespace-pre-wrap">{q.question}</p>
            </div>
            <div className="space-y-2 mb-6">
              {Object.entries(q.options).map(([k, v]) => {
                const sel = answers[q.id] === k;
                return (
                  <button key={k} onClick={() => pick(k)}
                    className={`w-full text-left p-3 rounded border-2 transition
                      ${sel ? 'bg-indigo-100 border-indigo-500 font-semibold' : 'bg-white border-slate-200 hover:border-indigo-300'}`}>
                    <span className="font-bold mr-2">{k}.</span>{v}
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      </div>
      {/* Bottom navigation */}
      <div className="bg-white border-t p-3 flex items-center justify-between gap-2">
        <button onClick={() => goto(curr - 1)} disabled={curr === 0}
          className="px-4 py-2 bg-slate-200 text-slate-700 rounded hover:bg-slate-300 disabled:opacity-40">← 上一題</button>
        <button onClick={() => { if (confirm(`確認提交測驗？\n已答 ${answered}/${test.questions.length} 題。`)) finalize(); }}
          className="px-6 py-2 bg-gradient-to-r from-green-600 to-emerald-600 text-white rounded font-bold hover:brightness-110">
          ✓ 提交測驗
        </button>
        <button onClick={() => goto(curr + 1)} disabled={curr === test.questions.length - 1}
          className="px-4 py-2 bg-slate-200 text-slate-700 rounded hover:bg-slate-300 disabled:opacity-40">下一題 →</button>
      </div>
    </div>
  );
}

function TestHistoryModal({ tests, onClose, onNewTest, onView, onDelete, onClearAll }) {

  const totalCorrect = tests.reduce((s, t) => s + t.score, 0);
  const overallAcc = totalQuestions > 0 ? ((totalCorrect / totalQuestions) * 100).toFixed(1) : 0;

  return (
    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onClick={onClose}>
      <div className="bg-white rounded-lg w-full max-w-3xl max-h-[90vh] flex flex-col" onClick={e => e.stopPropagation()}>

                const acc = t.total > 0 ? ((t.score / t.total) * 100).toFixed(1) : 0;
                const color = acc >= 80 ? 'bg-green-50 border-green-400' : acc >= 60 ? 'bg-yellow-50 border-yellow-400' : 'bg-red-50 border-red-400';
                const units = t.units.map(uid => findUnit(uid)?.title.split('：')[0] || uid).join('、');
                return (
                  <div key={t.id} className={`border-l-4 ${color} rounded p-3 hover:shadow-md transition`}>
                    <div className="flex justify-between items-start mb-2 flex-wrap gap-2">
                      <div>
                        <div className="font-bold text-slate-800">{t.timestamp}</div>
                        <div className="text-xs text-slate-600 mt-1">範圍：{units}</div>
                      </div>
                      <div className="text-right">
                        <div className="text-xl font-bold text-slate-800">{t.score}/{t.total}</div>
                        <div className="text-sm text-slate-600">{acc}%</div>
                      </div>
                    </div>
                    <div className="text-xs text-slate-500 flex gap-3 flex-wrap mb-2">
                      <span>⏱️ {fmtTime(t.timeUsed)} / {fmtTime(t.timeLimit)}</span>
                      <span>📊 {t.total} 題</span>
                      <span>🎯 平均 {(t.timeUsed / t.total).toFixed(1)} 秒/題</span>
                    </div>
                    <div className="flex gap-2">
                      <button onClick={() => onView(t)} className="px-3 py-1 bg-indigo-500 hover:bg-indigo-600 text-white text-xs rounded">📊 查看詳情</button>
                      <button onClick={() => { if (confirm('確認刪除此測驗記錄？')) onDelete(t.id); }} className="px-3 py-1 bg-red-500 hover:bg-red-600 text-white text-xs rounded">🗑️ 刪除</button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// 備份選單（已更新：含三類資料）
// ============================================================
function BackupMenu({ starred, practice, tests, onImport, onClose }) {
  const fileRef = useRef(null);
  const exportData = () => {
    const data = {
      version: 2,
      type: 'hkdse-ict-backup',
      exported: new Date().toISOString(),
      starred,
      practiceHistory: practice,
      testHistory: tests
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `hkdse-ict-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };
  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        const s = migrateStarred(data.starred || []);
        const p = data.practiceHistory || data.history || [];
        const tt = data.testHistory || [];
        if (confirm(`確認匯入？\n已標記：${s.length} 項\n答題練習記錄：${p.length} 項\n測驗記錄：${tt.length} 項\n\n⚠️ 將完全覆蓋目前的資料！`)) {
          onImport(s, p, tt);
          onClose();
        }
      } catch (err) { alert('無法讀取檔案：' + err.message); }
    };
    reader.readAsText(file);
  };
  return (
    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onClick={onClose}>
      <div className="bg-white rounded-lg max-w-md w-full p-6" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <h2 className="text-xl font-bold">💾 資料備份</h2>
          <button onClick={onClose} className="text-2xl text-slate-400 hover:text-slate-700">×</button>
        </div>
        <div className="space-y-3">
          <div className="p-3 bg-slate-50 rounded text-sm space-y-1">
            <div>⭐ 已標記：<span className="font-bold">{starred.length}</span> 項</div>
            <div>📝 答題練習記錄：<span className="font-bold">{practice.length}</span> 項</div>
            <div>📋 測驗記錄：<span className="font-bold">{tests.length}</span> 項</div>
          </div>
          <button onClick={exportData} className="w-full px-4 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded">📥 匯出所有資料（單一 JSON）</button>
          <button onClick={() => fileRef.current?.click()} className="w-full px-4 py-3 bg-green-600 hover:bg-green-700 text-white rounded">📤 匯入 JSON 備份</button>
          <input type="file" ref={fileRef} accept=".json" onChange={handleFile} className="hidden"/>
          <div className="text-xs text-slate-500 mt-2 p-2 bg-yellow-50 rounded border border-yellow-200">
            💡 備份包含：已標記文字與筆記、答題練習記錄、測驗記錄。匯入時會完全覆蓋現有資料，請先匯出現有資料以免丟失。
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// 主 App
// ============================================================
function App() {
  const [activeSection, setActiveSection] = useState(() => storage.get(STORAGE_KEYS.LAST_SECTION, 'home'));
  const [searchQuery, setSearchQuery] = useState('');
  const [showSidebar, setShowSidebar] = useState(true);
  const [sidebarUserToggled, setSidebarUserToggled] = useState(false);

  // 💾 持久化狀態
  const [starred, setStarred] = useState(() => migrateStarred(storage.get(STORAGE_KEYS.STARRED, [])));
  const [practice, setPractice] = useState(() => storage.get(STORAGE_KEYS.PRACTICE, []));
  const [tests, setTests] = useState(() => storage.get(STORAGE_KEYS.TESTS, []));
  const [settings, setSettings] = useState(() => storage.get(STORAGE_KEYS.SETTINGS, { fontSize: 'base' }));

  useEffect(() => { storage.set(STORAGE_KEYS.STARRED, starred); }, [starred]);
  useEffect(() => { storage.set(STORAGE_KEYS.PRACTICE, practice); }, [practice]);
  useEffect(() => { storage.set(STORAGE_KEYS.TESTS, tests); }, [tests]);
  useEffect(() => { storage.set(STORAGE_KEYS.SETTINGS, settings); }, [settings]);
  useEffect(() => { storage.set(STORAGE_KEYS.LAST_SECTION, activeSection); }, [activeSection]);

  // 題目庫
  const [questionBank, setQuestionBank] = useState({});
  const [loadingQ, setLoadingQ] = useState(true);
  const [loadStatus, setLoadStatus] = useState({ loaded: 0, failed: [], total: QUESTION_FILES.length });

  useEffect(() => {
    let loaded = 0; const failed = [];
    Promise.all(QUESTION_FILES.map(n =>
      fetch(`./data/${n}.json`, { cache: 'no-store' })
        .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
        .then(d => { loaded++; return d; })
        .catch(err => { failed.push(n); return {}; })
    )).then(rs => {
      const merged = rs.reduce((a, o) => ({ ...a, ...o }), {});
      setQuestionBank(merged);
      setLoadStatus({ loaded, failed, total: QUESTION_FILES.length });
      setLoadingQ(false);
    });
  }, []);

  // 模態狀態
  const [showStarred, setShowStarred] = useState(false);
  const [showPractice, setShowPractice] = useState(false);
  const [showTestHistory, setShowTestHistory] = useState(false);
  const [showTestSetup, setShowTestSetup] = useState(false);
  const [activeTest, setActiveTest] = useState(null);
  const [viewingResult, setViewingResult] = useState(null);
  const [showBackup, setShowBackup] = useState(false);

  // 標記流程
  const [selectedText, setSelectedText] = useState('');
  const [selectionCoords, setSelectionCoords] = useState(null);
  const [pendingStar, setPendingStar] = useState(null);

  useEffect(() => { if (!sidebarUserToggled && window.innerWidth < 768) setShowSidebar(false); }, [sidebarUserToggled]);

  useEffect(() => {
    let timer = null;
    const h = () => {
      if (timer) clearTimeout(timer);
      timer = setTimeout(() => {
        const sel = window.getSelection();
        if (!sel || sel.rangeCount === 0) { setSelectedText(''); setSelectionCoords(null); return; }
        const text = sel.toString().trim();
        if (text.length > 2 && text.length < 500) {
          try {
            const r = sel.getRangeAt(0).getBoundingClientRect();
            if (r.width > 0 || r.height > 0) {
              const isMobile = window.innerWidth < 768;
              const top = isMobile ? (r.bottom + window.scrollY + 20) : Math.max(r.top + window.scrollY - 42, 10);
              setSelectedText(text);
              setSelectionCoords({ top, left: r.left + r.width / 2 });
              return;
            }
          } catch {}
        }
        setSelectedText('');
        setSelectionCoords(null);
      }, 300);
    };
    document.addEventListener('selectionchange', h);
    document.addEventListener('mouseup', h);
    document.addEventListener('touchend', h);
    return () => {
      document.removeEventListener('selectionchange', h);
      document.removeEventListener('mouseup', h);
      document.removeEventListener('touchend', h);
      if (timer) clearTimeout(timer);
    };
  }, []);

  const openStarPrompt = () => {
    setPendingStar({ text: selectedText, section: activeSection });
    setSelectedText(''); setSelectionCoords(null);
    window.getSelection().removeAllRanges();
  };

  const confirmStar = (note) => {
    if (!pendingStar) return;
    setStarred([...starred, {
      id: Date.now(),
      text: pendingStar.text,
      section: pendingStar.section,
      note: note || '',
      timestamp: new Date().toLocaleString('zh-HK', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' })
    }]);
    setPendingStar(null);
  };

  const removeStar = (id) => setStarred(starred.filter(s => s.id !== id));
  const updateStarNote = (id, note) => setStarred(starred.map(s => s.id === id ? { ...s, note } : s));

  const recordPractice = (sid, q, ua, ok) => setPractice([...practice, {
    id: Date.now() + Math.random(), sectionId: sid, questionId: q.id,
    question: q.question, options: q.options,
    userAnswer: ua, correctAnswer: q.answer, explanation: q.explanation, isCorrect: ok,
    timestamp: new Date().toLocaleString('zh-HK', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' })
  }]);

  const importData = (s, p, t) => { setStarred(s); setPractice(p); setTests(t); };

  // 測驗流程
  const startTest = (config) => { setShowTestSetup(false); setActiveTest(config); };
  const completeTest = (result) => {
    setTests([...tests, result]);
    setActiveTest(null);
    setViewingResult(result);
  };
  const cancelTest = () => setActiveTest(null);
  const deleteTest = (id) => setTests(tests.filter(t => t.id !== id));

  // 搜尋
  const searchResults = useMemo(() => {
    if (!searchQuery.trim()) return [];
    const results = []; const q = searchQuery.toLowerCase();
    curriculumData.forEach(u => {
      u.sections.forEach(s => {
        if (s.title.toLowerCase().includes(q) || u.title.toLowerCase().includes(q))
          results.push({ unitTitle: u.title, sectionTitle: s.title, sectionId: s.id, match: `📁 ${s.title}` });
        s.content.forEach(b => {
          const ts = [];
          if (b.text) ts.push(b.text); if (b.items) ts.push(...b.items); if (b.title) ts.push(b.title);
          if (b.headers) ts.push(...b.headers); if (b.rows) b.rows.forEach(r => ts.push(...r));
          ts.forEach(t => {
            if (t && t.toLowerCase().includes(q)) {
              const i = t.toLowerCase().indexOf(q), st = Math.max(0, i - 15), e = Math.min(t.length, i + q.length + 25);
              results.push({ unitTitle: u.title, sectionTitle: s.title, sectionId: s.id, match: (st > 0 ? '...' : '') + t.substring(st, e) + (e < t.length ? '...' : '') });
            }
          });
        });
      });
    });
    const seen = new Set();
    return results.filter(r => { const k = r.sectionId + '|' + r.match; if (seen.has(k)) return false; seen.add(k); return true; }).slice(0, 50);
  }, [searchQuery]);

  const navigate = (sid) => {
    setActiveSection(sid); setSearchQuery('');
    setShowStarred(false); setShowPractice(false); setShowTestHistory(false);
    if (window.innerWidth < 768) setShowSidebar(false);
    setTimeout(() => { document.querySelector('main')?.scrollTo({ top: 0, behavior: 'smooth' }); }, 100);
  };

  const current = findSection(activeSection);
    const totalQ = Object.values(questionBank).reduce((s, a) => s + a.length, 0);
  const fc = { sm: 'text-sm', base: 'text-base', lg: 'text-lg' };

  return (
    <div className={`h-screen flex flex-col bg-slate-100 ${fc[settings.fontSize]}`}>
      <header className="bg-gradient-to-r from-indigo-700 via-purple-700 to-pink-700 text-white shadow-lg">
        <div className="px-3 md:px-4 py-2 md:py-3 flex items-center justify-between gap-2">
          <div className="flex items-center gap-2 min-w-0">
            <button onClick={() => { setShowSidebar(!showSidebar); setSidebarUserToggled(true); }} className="p-2 hover:bg-white/10 rounded md:hidden" aria-label="切換選單">☰</button>
            <div className="min-w-0">
              <h1 className="text-sm md:text-lg font-bold truncate">📚 HKDSE ICT 2026 速讀溫習筆記</h1>
              <div className="text-xs text-indigo-100 hidden md:block">題庫：{totalQ} 題</div>
            </div>
          </div>
          <div className="flex items-center gap-1 md:gap-2 flex-shrink-0">
            <div className="hidden md:flex items-center gap-1 bg-white/10 rounded px-2 py-1 text-xs">
              {['sm','base','lg'].map(sz => <button key={sz} onClick={() => setSettings({...settings, fontSize: sz})} className={`px-1 ${settings.fontSize === sz ? 'font-bold underline' : ''}`}>{sz==='sm'?'小':sz==='base'?'中':'大'}</button>)}
            </div>
            <button onClick={() => setShowStarred(true)} className="px-2 md:px-3 py-1.5 bg-white/10 hover:bg-white/20 rounded text-xs md:text-sm flex items-center gap-1">
              <span>⭐</span><span className="hidden sm:inline">已標記</span>
              {starred.length > 0 && <span className="bg-yellow-400 text-black px-1.5 rounded-full text-xs font-bold">{starred.length}</span>}
            </button>
            <button onClick={() => setShowPractice(true)} className="px-2 md:px-3 py-1.5 bg-white/10 hover:bg-white/20 rounded text-xs md:text-sm flex items-center gap-1">
              <span>📝</span><span className="hidden sm:inline">答題練習</span>
              {practice.length > 0 && <span className="bg-green-400 text-black px-1.5 rounded-full text-xs font-bold">{practice.length}</span>}
            </button>
            <button onClick={() => setShowTestHistory(true)} className="px-2 md:px-3 py-1.5 bg-white/10 hover:bg-white/20 rounded text-xs md:text-sm flex items-center gap-1">
              <span>📋</span><span className="hidden sm:inline">測驗</span>
              {tests.length > 0 && <span className="bg-pink-400 text-black px-1.5 rounded-full text-xs font-bold">{tests.length}</span>}
            </button>
            <button onClick={() => setShowBackup(true)} className="px-2 md:px-3 py-1.5 bg-white/10 hover:bg-white/20 rounded text-xs md:text-sm" title="匯出/匯入備份">💾</button>
          </div>
        </div>
        <div className="bg-yellow-100 text-yellow-900 px-3 py-1 text-[11px] md:text-xs border-t border-yellow-200">⚠️ 此筆記為 AI 整合及生成，內容只供參考，請保持求證精神以其他方式求證，切勿完全相信 AI 所生成的內容。</div>
      </header>

      {!loadingQ && loadStatus.failed.length > 0 && (
        <div className="bg-orange-100 border-b border-orange-300 text-orange-800 px-4 py-2 text-xs">
          ⚠️ 部分題庫檔案載入失敗：{loadStatus.failed.map(f => `${f}.json`).join(', ')}。
        </div>
      )}

      <SearchBar value={searchQuery} onChange={setSearchQuery} results={searchResults} onNavigate={navigate} />


      <div className="flex flex-1 overflow-hidden">
        <Sidebar visible={showSidebar} data={curriculumData} activeSection={activeSection} onSelect={navigate} onClose={() => { setShowSidebar(false); setSidebarUserToggled(true); }} questionBank={questionBank} />
        <main className="flex-1 overflow-y-auto p-3 md:p-6">
          {loadingQ ? (
            <div className="max-w-2xl mx-auto text-center py-16">
              <div className="inline-block animate-spin rounded-full h-16 w-16 border-4 border-indigo-200 border-t-indigo-600"></div>
              <div className="mt-4 text-slate-600 font-medium">📥 載入題庫中...</div>
            </div>
          ) : activeSection === 'home' ? (
            <div className="max-w-5xl mx-auto">
              <div className="bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-600 text-white rounded-2xl shadow-lg p-6 md:p-8 mb-6">
                <h2 className="text-2xl md:text-3xl font-bold mb-3">🏠 HKDSE ICT 個人化溫習系統</h2>
                <p className="text-sm md:text-base text-indigo-50 leading-relaxed">此系統整合筆記閱讀、文字標記、答題練習、模擬測驗，以及記錄匯入與匯出功能，方便你按單元追蹤學習進度。</p>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                <div className="bg-white rounded-xl p-5 shadow border border-slate-200">
                  <div className="text-lg font-bold mb-2">🖍️ 選取標記</div>
                  <p className="text-slate-600 text-sm leading-6">在筆記內容中以滑鼠拖曳或在手機上長按選取文字，待浮動按鈕出現後按「加入標記」，即可儲存重點及個人備註。</p>
                </div>
                <div className="bg-white rounded-xl p-5 shadow border border-slate-200">
                  <div className="text-lg font-bold mb-2">📝 答題練習</div>
                  <p className="text-slate-600 text-sm leading-6">進入任何章節後可即時作答系統題目，提交後會顯示正確答案與解釋，並自動寫入答題記錄。</p>
                </div>
                <div className="bg-white rounded-xl p-5 shadow border border-slate-200">
                  <div className="text-lg font-bold mb-2">📋 模擬測驗</div>
                  <p className="text-slate-600 text-sm leading-6">你可以自選單元開立測驗，系統會計分、統計時間與單元表現，方便在考前進行針對性練習。</p>
                </div>
                <div className="bg-white rounded-xl p-5 shadow border border-slate-200">
                  <div className="text-lg font-bold mb-2">💾 匯入與匯出記錄</div>
                  <p className="text-slate-600 text-sm leading-6">右上角的備份功能可匯出已標記、答題及測驗記錄，也可在新裝置匯入，避免資料遺失。</p>
                </div>
              </div>
              <div className="mt-6 text-center">
                <button onClick={() => navigate('A1')} className="px-5 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-bold shadow">開始溫習單元 A</button>
              </div>
            </div>
          ) : current ? (
            <SectionContent unit={current.unit} section={current.section} onRecordAnswer={recordPractice} questionBank={questionBank} starred={starred} />
          ) : (
            <div className="max-w-3xl mx-auto text-center py-16 text-slate-500">找不到指定內容。</div>
          )}
          {!loadingQ && (
            <div className="max-w-4xl mx-auto mt-6 p-4 bg-slate-50 border border-slate-200 rounded text-xs text-slate-500 text-center">
              💾 你的「已標記」、「答題練習」與「測驗」記錄會自動儲存於瀏覽器 localStorage。建議定期匯出備份。<br/>
              📝 題庫已從 data/*.json 載入，共 {totalQ} 題。<br/>
              🖍️ 選取筆記文字即可標記並加入筆記，有筆記的標記處會顯示 📝 圖示。
            </div>
          )}
        </main>
      </div>

      {/* 標記按鈕 */}
      {selectedText && selectionCoords && (
        <div style={{ position: 'fixed', top: Math.min(selectionCoords.top, window.innerHeight - 80) + 'px', left: Math.max(60, Math.min(selectionCoords.left, window.innerWidth - 80)) + 'px', transform: 'translateX(-50%)' }} className="z-50">
          <button onClick={openStarPrompt} className="bg-yellow-400 hover:bg-yellow-500 text-black px-3 py-2 rounded-lg shadow-xl font-bold text-sm border-2 border-yellow-600 fade-in">
            ⭐ 標記並加筆記
          </button>
        </div>
      )}

      {/* Modals */}
      {pendingStar && <QuickNoteModal text={pendingStar.text} onSave={confirmStar} onCancel={() => setPendingStar(null)} />}
      {showStarred && <StarredModal starred={starred} onClose={() => setShowStarred(false)} onRemove={removeStar} onUpdateNote={updateStarNote} onNavigate={navigate} />}
      {showPractice && <PracticeHistoryModal history={practice} onClose={() => setShowPractice(false)} onClear={() => setPractice([])} />}
      {showTestHistory && <TestHistoryModal tests={tests} onClose={() => setShowTestHistory(false)} onNewTest={() => { setShowTestHistory(false); setShowTestSetup(true); }} onView={(t) => { setShowTestHistory(false); setViewingResult(t); }} onDelete={deleteTest} onClearAll={() => setTests([])} />}
      {showTestSetup && <TestSetupModal questionBank={questionBank} onStart={startTest} onClose={() => setShowTestSetup(false)} />}
      {activeTest && <TestRunner test={activeTest} onSubmit={completeTest} onCancel={cancelTest} />}
      {viewingResult && <TestResultModal result={viewingResult} onClose={() => { setViewingResult(null); setShowTestHistory(true); }} />}
      {showBackup && <BackupMenu starred={starred} practice={practice} tests={tests} onImport={importData} onClose={() => setShowBackup(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
